version: 2

project_name: amux

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.BuildCommit={{.ShortCommit}}

archives:
  - formats:
      - tar.gz

checksum:
  name_template: checksums.txt
  algorithm: sha256
