version: 2

project_name: amux

builds:
  - id: amux
    binary: amux
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.BuildCommit={{.ShortCommit}}

archives:
  - id: archive
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz

checksum:
  name_template: checksums.txt
  algorithm: sha256

release:
  github:
    owner: weill-labs
    name: amux
  replace_existing_artifacts: true
  make_latest: true

brews:
  - name: amux
    ids:
      - archive
    repository:
      owner: weill-labs
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    commit_author:
      name: github-actions[bot]
      email: 41898282+github-actions[bot]@users.noreply.github.com
    commit_msg_template: "Update amux formula to {{ .Tag }}"
    homepage: https://github.com/weill-labs/amux
    description: Terminal multiplexer for human+agent workflows
    license: MIT
    url_template: "https://github.com/weill-labs/amux/releases/download/{{ .Tag }}/{{ .ArtifactName }}"
    caveats: |
      On first server start, amux installs its terminfo entry into ~/.terminfo.
      You can also run:
        amux install-terminfo
    test: |
      system "#{bin}/amux", "version"
