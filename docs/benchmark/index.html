<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>amux benchmarks</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <style>
    :root {
      --bg: #1e1e2e;
      --panel: #313244;
      --panel-border: #45475a;
      --panel-strong: #585b70;
      --text: #cdd6f4;
      --muted: #6c7086;
      --link: #89b4fa;
      --error: #f38ba8;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, sans-serif;
      line-height: 1.5;
      padding: 2rem;
    }
    h1 { margin-bottom: 0.25rem; }
    p.subtitle { color: var(--muted); margin-bottom: 0.5rem; }
    p.meta { color: #a6adc8; margin-bottom: 2rem; }
    a { color: var(--link); }
    .chart-container {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 14px;
      box-shadow: 0 14px 32px rgba(17, 17, 27, 0.22);
      margin-bottom: 1.5rem;
      padding: 1rem;
      position: relative;
    }
    .chart-header {
      align-items: center;
      display: flex;
      gap: 1rem;
      justify-content: space-between;
      margin-bottom: 0.75rem;
    }
    .chart-header h2 {
      color: var(--link);
      font-size: 1rem;
      margin: 0;
    }
    .fullscreen-toggle {
      background: rgba(137, 180, 250, 0.12);
      border: 1px solid rgba(137, 180, 250, 0.35);
      border-radius: 999px;
      color: var(--text);
      cursor: pointer;
      font: inherit;
      padding: 0.35rem 0.8rem;
      transition: background 120ms ease, border-color 120ms ease, transform 120ms ease;
    }
    .fullscreen-toggle:hover {
      background: rgba(137, 180, 250, 0.2);
      border-color: rgba(137, 180, 250, 0.55);
      transform: translateY(-1px);
    }
    .fullscreen-toggle:focus-visible {
      outline: 2px solid var(--link);
      outline-offset: 2px;
    }
    .chart-canvas-wrap {
      height: 320px;
      position: relative;
    }
    canvas {
      display: block;
      height: 100%;
      max-height: none;
      width: 100%;
    }
    body.chart-modal-open {
      overflow: hidden;
    }
    body.chart-modal-open::before {
      background: rgba(17, 17, 27, 0.74);
      backdrop-filter: blur(6px);
      content: "";
      inset: 0;
      position: fixed;
      z-index: 30;
    }
    .chart-container.is-expanded,
    .chart-container:fullscreen {
      background: var(--bg);
      border-color: var(--panel-strong);
      inset: 1rem;
      margin: 0;
      padding: 1.25rem;
      position: fixed;
      z-index: 40;
    }
    .chart-container.is-expanded .chart-canvas-wrap,
    .chart-container:fullscreen .chart-canvas-wrap {
      height: calc(100vh - 7rem);
    }
    .chart-container:fullscreen::backdrop {
      background: rgba(17, 17, 27, 0.9);
    }
    .error { color: var(--error); padding: 2rem 0; }

    @media (max-width: 720px) {
      body { padding: 1rem; }
      .chart-header {
        align-items: flex-start;
        flex-direction: column;
      }
      .chart-canvas-wrap {
        height: 260px;
      }
      .chart-container.is-expanded,
      .chart-container:fullscreen {
        inset: 0.5rem;
        padding: 1rem;
      }
      .chart-container.is-expanded .chart-canvas-wrap,
      .chart-container:fullscreen .chart-canvas-wrap {
        height: calc(100vh - 7.5rem);
      }
    }
  </style>
</head>
<body>
  <h1>amux benchmark trends</h1>
  <p class="subtitle"><a href="../">Back to amux</a> · Updated by the benchmark publish workflow on merges to main.</p>
  <p id="meta" class="meta">Loading latest run metadata...</p>
  <div id="charts"></div>
  <script type="module">
    import { main } from "./dashboard.mjs";

    main({ Chart: window.Chart });
  </script>
</body>
</html>
