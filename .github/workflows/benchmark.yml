name: Benchmarks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Check for code changes
        id: changes
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
        run: |
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            BASE="$PR_BASE_SHA"
          else
            BASE="$PUSH_BEFORE_SHA"
          fi
          CODE_CHANGED=$(git diff --name-only "$BASE" HEAD | grep -vE '\.(md)$|^docs/|^LICENSE$' | head -1)
          if [ -z "$CODE_CHANGED" ]; then
            echo "code_changed=false" >> "$GITHUB_OUTPUT"
            echo "Docs-only change, skipping benchmarks"
          else
            echo "code_changed=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-go@v5.4.0
        if: steps.changes.outputs.code_changed == 'true'
        with:
          go-version: "1.25"

      - name: Install tmux
        if: steps.changes.outputs.code_changed == 'true'
        run: sudo apt-get update && sudo apt-get install -y tmux

      - name: Install benchstat
        if: steps.changes.outputs.code_changed == 'true'
        run: go install golang.org/x/perf/cmd/benchstat@latest

      - name: Microbenchmarks
        if: steps.changes.outputs.code_changed == 'true'
        run: go test -bench=. -benchmem -count=5 -run='^$' ./internal/... -timeout 120s | tee bench-micro.txt

      - name: Integration benchmarks
        if: steps.changes.outputs.code_changed == 'true'
        run: go test -bench=. -benchmem -count=7 -run='^$' ./test/ -timeout 300s | tee bench-integration.txt

      - name: Combine results
        if: steps.changes.outputs.code_changed == 'true'
        run: cat bench-micro.txt bench-integration.txt > bench-all.txt

      - name: Upload benchmark results
        if: always() && steps.changes.outputs.code_changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            bench-micro.txt
            bench-integration.txt
            bench-all.txt

      - name: Benchmark summary
        if: always() && steps.changes.outputs.code_changed == 'true'
        run: |
          {
            echo '## Benchmarks'
            echo ''
            echo '### Microbenchmarks'
            echo '```'
            benchstat bench-micro.txt
            echo '```'
            echo ''
            echo '### Integration benchmarks'
            echo '```'
            benchstat bench-integration.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      # On main: update trend data via gh-pages
      - name: Update trend data
        if: github.ref == 'refs/heads/main' && steps.changes.outputs.code_changed == 'true'
        run: |
          go install go.bobheadxi.dev/gobenchdata@latest
          gobenchdata merge bench-all.txt --json benchmarks.json || true

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          mkdir -p /tmp/bench-data
          cp benchmarks.json /tmp/bench-data/ 2>/dev/null || true
          cp bench-all.txt /tmp/bench-data/

          if git fetch origin gh-pages 2>/dev/null; then
            git checkout gh-pages
          else
            git checkout --orphan gh-pages
            git rm -rf . 2>/dev/null || true
          fi

          cp /tmp/bench-data/* . 2>/dev/null || true
          git add benchmarks.json bench-all.txt 2>/dev/null || true
          git diff --cached --quiet || git commit -m "Update benchmark data [skip ci]"
          git push origin gh-pages 2>/dev/null || true

          git checkout -

      # On PR: compare against main baseline from gh-pages
      - name: Download main baseline
        if: github.event_name == 'pull_request' && steps.changes.outputs.code_changed == 'true'
        run: |
          git fetch origin gh-pages 2>/dev/null || true
          git show origin/gh-pages:bench-all.txt > baseline.txt 2>/dev/null || true
        continue-on-error: true

      - name: Compare with baseline
        if: github.event_name == 'pull_request' && steps.changes.outputs.code_changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          if [ ! -s baseline.txt ]; then
            echo "No baseline found on gh-pages, showing current results only"
            benchstat bench-all.txt
            exit 0
          fi

          COMPARISON=$(benchstat baseline.txt bench-all.txt 2>&1 || true)
          echo "$COMPARISON"

          BODY="## Benchmark Comparison
\`\`\`
${COMPARISON}
\`\`\`

> Regressions >15% are flagged as warnings. Results from benchstat with statistical significance testing."

          gh pr comment "$PR_NUMBER" --body "$BODY" --edit-last 2>/dev/null || \
          gh pr comment "$PR_NUMBER" --body "$BODY"

          if echo "$COMPARISON" | grep -qE '\+[1-9][5-9]\.[0-9]+%|\+[2-9][0-9]+\.[0-9]+%|\+[0-9]{3,}\.[0-9]+%'; then
            echo "::warning::Potential performance regression detected (>15%). Check benchstat output above."
          fi
