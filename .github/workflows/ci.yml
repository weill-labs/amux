name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 2

      - name: Fetch PR base for diff
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: git fetch --no-tags --depth=1 origin "$BASE_SHA"

      - name: Check for code changes
        id: changes
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
        run: |
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            BASE="$PR_BASE_SHA"
          else
            BASE="$PUSH_BEFORE_SHA"
          fi
          CODE_CHANGED=$(git diff --name-only "$BASE" HEAD | grep -vE '\.(md)$|^docs/|^LICENSE$' | head -1)
          if [ -z "$CODE_CHANGED" ]; then
            echo "code_changed=false" >> "$GITHUB_OUTPUT"
            echo "Docs-only change, skipping tests"
          else
            echo "code_changed=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-go@v6.3.0
        if: steps.changes.outputs.code_changed == 'true'
        with:
          go-version: "1.25"

      - name: Cache apt packages
        if: steps.changes.outputs.code_changed == 'true'
        uses: actions/cache@v5.0.3
        with:
          path: ~/apt-cache
          key: apt-tmux-${{ runner.os }}

      - name: Install tmux
        if: steps.changes.outputs.code_changed == 'true'
        run: |
          if [ -d ~/apt-cache ] && ls ~/apt-cache/*.deb 1>/dev/null 2>&1; then
            sudo dpkg -i ~/apt-cache/*.deb 2>/dev/null || sudo apt-get install -y -f
          else
            sudo apt-get update && sudo apt-get install -y tmux
            mkdir -p ~/apt-cache
            cp /var/cache/apt/archives/tmux*.deb ~/apt-cache/ 2>/dev/null || true
            cp /var/cache/apt/archives/libevent*.deb ~/apt-cache/ 2>/dev/null || true
          fi

      - name: Cache Go tools
        if: steps.changes.outputs.code_changed == 'true'
        uses: actions/cache@v5.0.3
        with:
          path: ~/go/bin
          key: go-tools-${{ runner.os }}-junit-report-v2.1.0

      - name: Build
        if: steps.changes.outputs.code_changed == 'true'
        run: go build ./...

      - name: Vet
        if: steps.changes.outputs.code_changed == 'true'
        run: go vet ./...

      - name: Install go-junit-report
        if: steps.changes.outputs.code_changed == 'true'
        run: |
          if [ -f ~/go/bin/go-junit-report ]; then
            echo "go-junit-report already cached"
          else
            go install github.com/jstemmer/go-junit-report/v2@v2.1.0
          fi

      - name: Tests with coverage
        if: steps.changes.outputs.code_changed == 'true'
        run: scripts/coverage.sh --ci

      - name: Convert test results to JUnit XML
        if: ${{ !cancelled() && steps.changes.outputs.code_changed == 'true' }}
        run: |
          if [ -f unit-results.json ]; then
            go-junit-report -parser gojson -in unit-results.json -out unit-results.junit.xml
          fi
          if [ -f integration-results.json ]; then
            go-junit-report -parser gojson -in integration-results.json -out integration-results.junit.xml
          fi

      - name: Upload test results to Codecov
        if: ${{ !cancelled() && steps.changes.outputs.code_changed == 'true' }}
        uses: codecov/codecov-action@v5.5.3
        with:
          files: unit-results.junit.xml,integration-results.junit.xml
          report_type: test_results
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: Coverage summary
        if: always() && steps.changes.outputs.code_changed == 'true'
        run: |
          if [ -f coverage-summary.txt ]; then
            total=$(tail -1 coverage-summary.txt | awk '{print $NF}')
            {
              echo '## Coverage'
              echo ''
              echo "**Total: ${total}**"
              echo ''
              echo '<details><summary>Per-function breakdown</summary>'
              echo ''
              echo '```'
              cat coverage-summary.txt
              echo '```'
              echo '</details>'
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload coverage to Codecov
        if: always() && steps.changes.outputs.code_changed == 'true'
        uses: codecov/codecov-action@v5.5.3
        with:
          files: merged-coverage.txt
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: Upload coverage artifacts
        if: always() && steps.changes.outputs.code_changed == 'true'
        uses: actions/upload-artifact@v4.6.2
        with:
          name: coverage-artifacts
          if-no-files-found: ignore
          path: |
            unit-coverage.txt
            integration-coverage.txt
            merged-coverage.txt
            coverage-summary.txt

      - name: Flake detection (integration tests x3)
        if: steps.changes.outputs.code_changed == 'true'
        run: go test -count=3 -parallel 2 -timeout 300s ./test/

      - name: Test timing summary
        if: always() && steps.changes.outputs.code_changed == 'true'
        run: |
          total=$(jq -r 'select(.Action=="pass" and .Test) | .Elapsed' \
            unit-results.json integration-results.json \
            | awk '{s+=$1} END {printf "%.2f", s}')
          {
            echo '## Test Timing'
            echo ''
            echo '| Test | Duration |'
            echo '|------|----------|'
            jq -r 'select(.Action=="pass" and .Test) | "| \(.Test) | \(.Elapsed)s |"' \
              unit-results.json integration-results.json \
              | sort -t'|' -k3 -rn
            echo ''
            echo "**Total: ${total}s**"
          } >> "$GITHUB_STEP_SUMMARY"
