name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-go@v5.4.0
        with:
          go-version: "1.25"

      - name: Install tmux
        run: sudo apt-get update && sudo apt-get install -y tmux

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Unit tests
        run: go test ./internal/... -timeout 60s

      - name: Integration tests
        run: go test -v -run 'Test(Basic|Split|Focus|PaneClose|List|Status|Reattach)' -timeout 120s
